<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollecto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: clamp(24px, 5vw, 32px); color: #f1c40f; }
        p { margin: 0 0 10px 0; font-size: clamp(14px, 4vw, 18px); }
        #scoreDisplay { font-size: 24px; font-weight: bold; color: #2ecc71; margin: 0; }
        #pauseBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            background: rgba(241, 196, 15, 0.8);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        #pauseBtn:hover { background: rgba(255, 215, 0, 1); }
        #desktopOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        #popupContent {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            max-width: 80%;
            border: 2px solid #f1c40f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .popup-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .popup-btn:active { transform: scale(0.98); }
        #btnDesktop { background: #f1c40f; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="desktopOverlay">
        <div id="popupContent">
            <h3>Mobile Detected</h3>
            <p>Would you like to switch to Desktop View for a wider perspective?</p>
            <button id="btnDesktop" class="popup-btn">Simulate Desktop Mode</button>
        </div>
    </div>

    <button id="pauseBtn">PAUSE</button>

    <div id="ui">
        <h1>Kollecto</h1>
        <p>Dodge bees, <b>collect fruits!</b> <br>Arrows/Space or Tap Sides</p>
        <div id="scoreDisplay">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const overlay = document.getElementById('desktopOverlay');
const viewportMeta = document.getElementById('viewport');
const pauseBtn = document.getElementById('pauseBtn');

let width, height;
let frame = 0;
let lane = 0; 
let targetX = 0;
let currentX = 0;
let speed = 8;
let timeHue = 200;

let score = 0;
let gameOver = false;
let isPaused = false; 
let bees = [];
let fruits = [];

let isSimulatedDesktop = false;
let lastDifficultyIncrease = Date.now();
const SoundEngine = (() => {
    let actx;
    let initialized = false;
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    let noteIdx = 2;

    function init() {
        if (initialized) {
            if (actx && actx.state === 'suspended') actx.resume();
            return;
        }
        actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
        initialized = true;
        startLoops();
    }

    function toggle(pauseAudio) {
        if (!actx) return;
        if (pauseAudio) actx.suspend();
        else actx.resume();
    }
    
    function playTone(freq, type, duration, vol, slideToFreq) {
        if (!actx || actx.state !== 'running') return;
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, actx.currentTime);
        if (slideToFreq) osc.frequency.exponentialRampToValueAtTime(slideToFreq, actx.currentTime + duration);
        gain.gain.setValueAtTime(0, actx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, actx.currentTime + duration * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
        osc.connect(gain);
        gain.connect(actx.destination);
        osc.start(actx.currentTime);
        osc.stop(actx.currentTime + duration);
    }

    function playInsectTone(baseFreq, modFreq, duration, vol) {
        if (!actx || actx.state !== 'running') return;
        const osc = actx.createOscillator();
        const mod = actx.createOscillator();
        const modGain = actx.createGain();
        const mainGain = actx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.value = baseFreq;
        mod.type = 'square';
        mod.frequency.value = modFreq;

        mod.connect(modGain.gain);
        osc.connect(modGain);
        modGain.connect(mainGain);
        mainGain.connect(actx.destination);

        mainGain.gain.setValueAtTime(0, actx.currentTime);
        mainGain.gain.linearRampToValueAtTime(vol, actx.currentTime + duration * 0.2);
        mainGain.gain.linearRampToValueAtTime(0, actx.currentTime + duration);

        osc.start(actx.currentTime);
        mod.start(actx.currentTime);
        osc.stop(actx.currentTime + duration);
        mod.stop(actx.currentTime + duration);
    }
    function playCollectSound() {
        if (!actx || actx.state !== 'running') return;
        playTone(600, 'sine', 0.1, 0.1, 1200);
        setTimeout(() => playTone(1200, 'sine', 0.15, 0.1, 2400), 80);
    }

    function startLoops() {
        setInterval(() => {
            if (actx.state === 'running' && !gameOver && !isPaused) {
                playTone(notes[noteIdx], 'sine', 2.0, 0.05);
                noteIdx += Math.random() > 0.5 ? 1 : -1;
                if (noteIdx < 0) noteIdx = 0;
                if (noteIdx >= notes.length) noteIdx = notes.length - 1;
            }
        }, 800);
        function nextBird() {
            if (actx.state === 'running' && !gameOver && !isPaused) {
                const r = Math.random();
                if (r < 0.33) playTone(600, 'sine', 0.5, 0.08, 400);
                else if (r < 0.66) {
                    playTone(1800, 'sine', 0.2, 0.06, 900);
                    setTimeout(() => playTone(1800, 'sine', 0.2, 0.06, 900), 250);
                } else playTone(700, 'sine', 0.3, 0.08, 1400);
            }
            setTimeout(nextBird, 3000 + Math.random() * 5000);
        }
        nextBird();
        function nextInsect() {
            if (actx.state === 'running' && !gameOver && !isPaused) {
                const r = Math.random();
                if (r < 0.25) playInsectTone(4500, 45, 1.0, 0.02);
                else if (r < 0.5) playInsectTone(3500, 35, 0.8, 0.02);
                else if (r < 0.75) playInsectTone(2500, 30, 1.2, 0.02);
                else playInsectTone(5500, 50, 0.6, 0.02);
            }
            setTimeout(nextInsect, 2000 + Math.random() * 4000);
        }
        nextInsect();
    }
    
    return { init, toggle, playCollectSound };
})();

function checkDevice() {
    if (window.innerWidth < 768) overlay.style.display = 'flex';
}

document.getElementById('btnDesktop').addEventListener('click', () => {
    SoundEngine.init();
    viewportMeta.setAttribute('content', 'width=1200');
    overlay.style.display = 'none';
    isSimulatedDesktop = true;
    lastDifficultyIncrease = Date.now();
    setTimeout(resize, 100);
});

checkDevice();

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function togglePause() {
    if (gameOver) return;
    SoundEngine.init();
    isPaused = !isPaused;
    pauseBtn.innerText = isPaused ? "RESUME" : "PAUSE";
    SoundEngine.toggle(isPaused);
    if (!isPaused) animate(); 
}

pauseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePause();
});

window.addEventListener('keydown', (e) => {
    SoundEngine.init();
    if (gameOver && e.key === 'Enter') location.reload();
    if (e.code === 'Space') {
        e.preventDefault();
        togglePause();
    }
    if (!isPaused) {
        if (e.key === 'ArrowLeft' && lane > -1) lane--;
        if (e.key === 'ArrowRight' && lane < 1) lane++;
    }
});

window.addEventListener('touchstart', (e) => {
    SoundEngine.init();
    if (gameOver) {
        location.reload(); 
        return;
    }
    if (isPaused) return;

    const touchX = e.touches[0].clientX;
    if (touchX < width / 2) {
        if (lane > -1) lane--;
    } else {
        if (lane < 1) lane++;
    }
}, { passive: false });

window.addEventListener('mousedown', () => SoundEngine.init(), { once: true });

const butterflies = [];
for(let i = 0; i < 8; i++) {
    butterflies.push({
        x: Math.random() * 1600 - 800, 
        z: Math.random(),
        offset: Math.random() * 100,
        color: `hsl(${Math.random() * 60 + 10}, 100%, 70%)` 
    });
}

const floraParticles = [];
for(let i = 0; i < 700; i++) { 
    let rand = Math.random();
    let type = rand > 0.3 ? 3 : Math.floor(Math.random() * 3);
    let isPortrait = window.innerHeight > window.innerWidth;
    let spread = isPortrait ? 1500 : 4000;
    let zVal = Math.random();
    let isFarBackground = isPortrait && i > 450; 
    
    if (isFarBackground) {
        zVal = 0.6 + Math.random() * 0.4;
    }

    floraParticles.push({
        x: Math.random() * spread - (spread / 2), 
        z: zVal, 
        type: type, 
        seed: Math.random() * 10, 
        color: `hsl(${100 + Math.random() * 40}, ${70 + Math.random() * 30}%, ${30 + Math.random() * 25}%)`,
        flowerColor: `hsl(${Math.random() * 360}, 80%, 70%)`,
        isFar: isFarBackground
    });
}

const clouds = [];
const skyWidth = 1600;
for(let i = 0; i < 10; i++) {
    let depth = Math.random();
    clouds.push({
        x: Math.random() * skyWidth,
        y: Math.random() * (window.innerHeight * 0.35),
        size: 40 + (depth * 80),
        speed: 0.1 + (depth * 0.2),
        opacity: 0.1 + (depth * 0.3)
    });
}

const boy = {
    x: 0, y: 0, width: 30, height: 60,
    update() {
        const horizon = height * 0.5;
        const playerY = height - 150;
        const playerZ = (playerY - horizon) / (height - horizon);
        const laneSpacing = width < 600 ? width * 0.25 : 150;
        targetX = lane * laneSpacing * playerZ;
        currentX += (targetX - currentX) * 0.15;
    },
    draw() {
        const cx = width / 2 + currentX;
        const cy = height - 150;
        const runCycle = frame * 0.2;
        const bob = Math.abs(Math.cos(runCycle)) * 10; 
        const limbSwing = Math.sin(runCycle) * 15;   

        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${0.4 - (bob * 0.02)})`;
        ctx.beginPath();
        ctx.ellipse(cx, cy + 20, 25 - (bob*0.5), 8, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.translate(cx, cy - bob); 
        ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.strokeStyle = '#1a120c';
        ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-12, 10 + limbSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(12, 10 - limbSwing); ctx.stroke();
        let bodyGrad = ctx.createLinearGradient(-15, -40, 15, -5);
        bodyGrad.addColorStop(0, '#5dade2');
        bodyGrad.addColorStop(1, '#2874a6');
        ctx.fillStyle = bodyGrad; 
        ctx.fillRect(-15, -40, 30, 35);
        ctx.strokeStyle = '#e0ac69'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(15, -35); ctx.lineTo(20, -15 + limbSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-15, -35); ctx.lineTo(-20, -15 - limbSwing); ctx.stroke();
        let headGrad = ctx.createRadialGradient(-5, -55, 2, 0, -52, 14);
        headGrad.addColorStop(0, '#ffdbac');
        headGrad.addColorStop(1, '#c58c54');
        ctx.fillStyle = headGrad; 
        ctx.beginPath(); ctx.arc(0, -52, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#2c1e14'; ctx.beginPath(); ctx.arc(0, -56, 15, Math.PI, 0); ctx.fill();
        ctx.fillRect(-15, -57, 30, 10); 
        ctx.restore();
    }
};

function drawBackground() {
    timeHue += 0.05; 
    const skyGrad = ctx.createLinearGradient(0, 0, 0, height/2);
    skyGrad.addColorStop(0, `hsl(${timeHue}, 70%, 30%)`);
    skyGrad.addColorStop(0.6, `hsl(${timeHue + 20}, 60%, 60%)`);
    skyGrad.addColorStop(1, `hsl(${timeHue + 40}, 50%, 80%)`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, width, height);
    const sunGrad = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, 300);
    sunGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
    sunGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(0, 0, width, height/2);
    clouds.forEach(c => {
        if(!isPaused) c.x += c.speed;
        if(c.x > skyWidth + c.size) {
            c.x = -c.size;
            c.y = Math.random() * (height * 0.35);
        }
        if (c.x > -c.size && c.x < width + c.size) {
            ctx.fillStyle = `rgba(255, 255, 255, ${c.opacity})`;
            ctx.beginPath();
            ctx.ellipse(c.x, c.y, c.size, c.size/3, 0, 0, Math.PI*2);
            ctx.fill();
        }
    });

    const horizon = height * 0.5;
    const meadowHue = 120 + Math.sin(timeHue * 0.02) * 35; 
    const meadowSat = 55 + Math.sin(timeHue * 0.03) * 10;  
    const meadowLight = 32 + Math.cos(timeHue * 0.02) * 8; 
    ctx.fillStyle = `hsl(${meadowHue + 10}, ${meadowSat - 10}%, ${meadowLight - 15}%)`;
    ctx.beginPath();
    ctx.moveTo(0, horizon);
    ctx.quadraticCurveTo(width * 0.25, horizon - 50, width * 0.5, horizon);
    ctx.quadraticCurveTo(width * 0.75, horizon - 70, width, horizon);
    ctx.fill();
    const groundGrad = ctx.createLinearGradient(0, horizon, 0, height);
    groundGrad.addColorStop(0, `hsl(${meadowHue}, ${meadowSat-20}%, ${meadowLight+10}%)`);
    groundGrad.addColorStop(1, `hsl(${meadowHue}, ${meadowSat}%, ${meadowLight-10}%)`);
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, horizon, width, height - horizon);
    ctx.fillStyle = `rgba(0, 0, 0, 0.06)`;
    for(let i = 0; i < 24; i++) {
        if (i % 2 === 0) continue;
        let z1 = i / 24;
        let z2 = (i + 1) / 24;
        let py1 = horizon + Math.pow(z1, 1.5) * (height - horizon);
        let py2 = horizon + Math.pow(z2, 1.5) * (height - horizon);
        ctx.fillRect(0, py1, width, py2 - py1);
    }

    drawFlora(horizon);
}

function drawFlora(horizon) {
    const wind = Math.sin(frame * 0.02) * 10 + Math.sin(frame * 0.05) * 5;
    const isPortrait = height > width;

    floraParticles.sort((a, b) => b.z - a.z);

    floraParticles.forEach(p => {
        if (p.isFar && !isPortrait) return;

        if (!isPaused) p.z -= speed / 3000; 
        let minZ = (p.isFar && isPortrait) ? 0.6 : 0;

        if (p.z <= minZ) { 
            p.z = 1; 
            let spread = isPortrait ? 1500 : 4000;
            p.x = Math.random() * spread - (spread / 2); 
        }
        ctx.globalAlpha = Math.min(1, p.z * 4);

        const perspective = 1 / (p.z + 0.1);
        const px = width / 2 + (p.x * perspective);
        const py = horizon + ( (1 - p.z) * (height - horizon) );
        const size = (1 - p.z) * 80;
        
        const sway = (Math.sin(frame * 0.05 + p.seed) * (size * 0.2)) + (wind * perspective * 0.2);

        if (px > -100 && px < width + 100) {
            ctx.fillStyle = p.color;
            ctx.strokeStyle = p.color;
            ctx.lineCap = 'round';

            if (p.type === 0) { 
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.quadraticCurveTo(px + sway, py - size/1.5, px + sway * 1.5, py - size);
                ctx.lineWidth = size / 10;
                ctx.stroke();
            } 
            else if (p.type === 1) { 
                ctx.fillRect(px - 1, py - size/3, 2, size/3); 
                ctx.fillStyle = p.flowerColor;
                for(let j=0; j<3; j++) {
                    ctx.beginPath();
                    ctx.arc(px + Math.cos(j*2) * (size/8) + (sway/2), (py - size/3) + Math.sin(j*2) * (size/8), size/8, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            else if (p.type === 2) { 
                ctx.fillStyle = `rgba(0,0,0,0.2)`; 
                ctx.beginPath();
                ctx.ellipse(px, py, size/4, size/10, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py - size/10, size/6, 0, Math.PI * 2);
                ctx.fill();
            }
            else if (p.type === 3) {
                ctx.lineWidth = size / 10;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.quadraticCurveTo(px - size/4 + sway, py - size/2, px - size/2 + sway*1.5, py - size*0.8);
                ctx.moveTo(px, py);
                ctx.quadraticCurveTo(px + sway, py - size/1.5, px + sway*2, py - size*1.1);
                ctx.moveTo(px, py);
                ctx.quadraticCurveTo(px + size/4 + sway, py - size/2, px + size/2 + sway*1.5, py - size*0.7);
                ctx.stroke();
            }
        }
        ctx.globalAlpha = 1.0;
    });
}

function drawPath() {
    const horizon = height * 0.5;
    const pathWidthBase = width < 600 ? width * 0.45 : 400;
    const pathGrad = ctx.createLinearGradient(0, horizon, 0, height);
    pathGrad.addColorStop(0, '#5a4634');
    pathGrad.addColorStop(1, '#2c1e14');

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(width / 2 - 50, horizon);
    ctx.lineTo(width / 2 + 50, horizon);
    ctx.lineTo(width / 2 + pathWidthBase, height);
    ctx.lineTo(width / 2 - pathWidthBase, height);
    ctx.closePath();
    ctx.fillStyle = pathGrad;
    ctx.fill();
    for (let i = 0; i < 60; i++) {
        let z = ( (frame * speed + i * 40) % 1000) / 1000;
        let py = horizon + z * (height - horizon);
        let pW = 100 + z * (pathWidthBase * 2 - 100);
        let px = (width / 2 - pW / 2) + ((Math.sin(i) * 0.5 + 0.5) * pW);
        
        ctx.globalAlpha = z * 1.5;
        ctx.fillStyle = `rgba(155, 89, 182, ${z})`;
        ctx.beginPath(); ctx.arc(px, py, z * 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(241, 196, 15, ${z})`;
        ctx.beginPath(); ctx.arc(px, py, z * 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
}

function drawButterflies() {
    const horizon = height * 0.5;
    butterflies.sort((a, b) => b.z - a.z);

    butterflies.forEach(b => {
        if (!isPaused) b.z -= speed / 2500;
        if (b.z <= 0) { b.z = 1; b.x = Math.random() * 1600 - 800; }

        ctx.globalAlpha = Math.min(1, b.z * 4);
        const perspective = 1 / (b.z + 0.1);
        const bSize = (1 - b.z) * 20; 
        const flightX = Math.sin(frame * 0.1 + b.offset) * 100;
        const flightY = Math.cos(frame * 0.08 + b.offset) * 40;
        
        const px = width / 2 + (b.x + flightX) * perspective;
        const py = (horizon + (1 - b.z) * (height - horizon)) - 50 + flightY;

        if (px > -50 && px < width + 50 && bSize > 1) {
            ctx.fillStyle = b.color;
            const wingGap = Math.abs(Math.sin(frame * 0.3)) * bSize;
            ctx.beginPath();
            ctx.ellipse(px - wingGap/2, py, wingGap/2, bSize/2, 0, 0, Math.PI * 2);
            ctx.ellipse(px + wingGap/2, py, wingGap/2, bSize/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(px - 1, py - bSize/4, 2, bSize/2);
        }
    });
    ctx.globalAlpha = 1.0;
}

function drawFruits() {
    const horizon = height * 0.5;
    const playerCX = width / 2 + currentX;
    const playerCY = height - 150;
    const laneSpacing = width < 600 ? width * 0.25 : 150;
    
    if (!isPaused && frame % 90 === 0) {
        fruits.push({
            lane: Math.floor(Math.random() * 3) - 1,
            z: 0.05,
            type: Math.random() > 0.5 ? 'apple' : 'orange'
        });
    }

    for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i];
        if (!isPaused) f.z += speed / 700;

        if (f.z > 1.2) {
            fruits.splice(i, 1);
            continue;
        }

        let px = width / 2 + (f.lane * laneSpacing * f.z);
        let py = horizon + f.z * (height - horizon);
        let fSize = 5 + f.z * 35;
        
        if (py > playerCY - 50 && py < playerCY + 30) {
            if (Math.abs(px - playerCX) < 45) {
                score += 50; 
                scoreDisplay.innerText = `Score: ${score}`;
                SoundEngine.playCollectSound();
                fruits.splice(i, 1);
                continue;
            }
        }
        
        ctx.save();
        ctx.globalAlpha = Math.min(1, f.z * 3);
        ctx.fillStyle = `rgba(0, 0, 0, ${0.4 * f.z})`;
        ctx.beginPath();
        ctx.ellipse(px, py, fSize * 0.8, fSize * 0.3, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.translate(px, py - fSize);
        let fruitGrad = ctx.createRadialGradient(-fSize/4, -fSize/4, fSize/10, 0, 0, fSize);
        if (f.type === 'apple') {
            fruitGrad.addColorStop(0, '#ff9999');
            fruitGrad.addColorStop(0.3, '#e74c3c');
            fruitGrad.addColorStop(1, '#900000');
        } else {
            fruitGrad.addColorStop(0, '#ffdf80');
            fruitGrad.addColorStop(0.3, '#f39c12');
            fruitGrad.addColorStop(1, '#a64b00');
        }

        ctx.fillStyle = fruitGrad;
        ctx.beginPath();
        ctx.arc(0, 0, fSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(-2, -fSize - 2, 4, fSize/2);
        ctx.restore();
    }
}

function drawBees() {
    const horizon = height * 0.5;
    const playerCX = width / 2 + currentX;
    const playerCY = height - 150;
    const laneSpacing = width < 600 ? width * 0.25 : 150;

    if (!isPaused && frame % 40 === 0) {
        let newBee = {
            lane: Math.floor(Math.random() * 3) - 1,
            z: 0.05,
            passed: false,
            offset: Math.random() * 100,
            targetLane: null, 
            switchProgress: 0
        };

        if (isSimulatedDesktop && Math.random() < 0.3) {
            let possibleLanes = [-1, 0, 1].filter(l => l !== newBee.lane);
            newBee.targetLane = possibleLanes[Math.floor(Math.random() * possibleLanes.length)];
        }
        
        bees.push(newBee);
    }

    for (let i = bees.length - 1; i >= 0; i--) {
        let bee = bees[i];
        if (!isPaused) bee.z += speed / 700;

        if (bee.z > 1.2) {
            bees.splice(i, 1);
            continue;
        }

        let currentLanePos = bee.lane;
        if (bee.targetLane !== null && bee.z > 0.3) { 
            bee.switchProgress += 0.02; 
            if (bee.switchProgress > 1) bee.switchProgress = 1;
            currentLanePos = bee.lane + (bee.targetLane - bee.lane) * bee.switchProgress;
            
            if (bee.switchProgress >= 1) {
                bee.lane = bee.targetLane;
                bee.targetLane = null;
            }
        }

        let px = width / 2 + (currentLanePos * laneSpacing * bee.z);
        let py = horizon + bee.z * (height - horizon);
        let bSize = 5 + bee.z * 40; 

        if (!bee.passed) {
            if (py > playerCY - 50 && py < playerCY + 30) { 
                if (Math.abs(px - playerCX) < 40) { 
                    gameOver = true;
                    SoundEngine.toggle(true);
                }
            }
            if (py >= playerCY + 30) {
                bee.passed = true;
                score += 10;
                scoreDisplay.innerText = `Score: ${score}`;
            }
        }

        ctx.save();
        ctx.globalAlpha = Math.min(1, bee.z * 3);
        ctx.fillStyle = `rgba(0, 0, 0, ${0.3 * bee.z})`;
        ctx.beginPath();
        ctx.ellipse(px, py, bSize * 1.2, bSize * 0.4, 0, 0, Math.PI*2);
        ctx.fill();

        let wobble = Math.sin(frame * 0.2 + bee.offset) * (bee.z * 15);
        ctx.translate(px + wobble, py - (bSize * 1.5) + Math.cos(frame * 0.3) * 5); 
        let baseColor = (bee.targetLane !== null || bee.switchProgress > 0) ? '#e67e22' : '#f1c40f';
        let bodyGrad = ctx.createRadialGradient(-bSize/3, -bSize/3, bSize/5, 0, 0, bSize);
        bodyGrad.addColorStop(0, '#fff');
        bodyGrad.addColorStop(0.2, baseColor);
        bodyGrad.addColorStop(1, '#8a6e00');
        
        ctx.fillStyle = bodyGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, bSize, bSize * 0.8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.ellipse(-bSize * 0.2, 0, bSize * 0.15, bSize * 0.78, 0, 0, Math.PI*2);
        ctx.ellipse(bSize * 0.2, 0, bSize * 0.15, bSize * 0.78, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = (bee.targetLane !== null) ? '#ff0000' : '#e74c3c'; 
        ctx.beginPath(); ctx.arc(-bSize*0.3, bSize*0.2, bSize*0.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bSize*0.3, bSize*0.2, bSize*0.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.strokeStyle = 'rgba(200, 200, 255, 0.8)';
        ctx.lineWidth = 1;
        let wingFlap = Math.abs(Math.sin(frame * 1.5)) * bSize;
        
        ctx.beginPath(); ctx.ellipse(-bSize*0.8, -bSize*0.5, bSize*0.6, wingFlap, Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(bSize*0.8, -bSize*0.5, bSize*0.6, wingFlap, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        
        ctx.restore();
    }
}

function animate() {
    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#e74c3c';
        ctx.font = 'bold 40px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('BZZZH! GAME OVER', width / 2, height / 2 - 40);
        ctx.fillStyle = 'white';
        ctx.font = '20px "Segoe UI", sans-serif';
        ctx.fillText(`Final Score: ${score}`, width / 2, height / 2 + 20);
        ctx.fillText('Tap or Press Enter to Restart', width / 2, height / 2 + 70);
        return; 
    }

    if (isPaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 50px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', width / 2, height / 2);
        ctx.fillStyle = 'white';
        ctx.font = '20px "Segoe UI", sans-serif';
        ctx.fillText('Press Space or Tap Resume', width / 2, height / 2 + 40);
        return; 
    }

    if (isSimulatedDesktop) {
        let now = Date.now();
        if (now - lastDifficultyIncrease >= 60000) { 
            speed *= 1.00; 
            lastDifficultyIncrease = now;
        }
    }

    ctx.clearRect(0, 0, width, height);
    frame++;
    drawBackground(); 
    drawPath();        
    boy.update();
    boy.draw();        
    drawFruits();
    drawBees();        
    drawButterflies(); 
    
    requestAnimationFrame(animate);
}

animate();
</script>
